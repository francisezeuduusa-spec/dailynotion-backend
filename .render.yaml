# Render Blueprints - Auto-deploy environment variables
# NOTE: Sensitive values should be set manually in Render Dashboard
# or use Render's secret sync feature (sync: false)
services:
  - type: web
    name: dailynotion-backend
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: FRONTEND_URL
        value: https://dailynotion-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SUPABASE_URL
        value: https://rdwkzqzqhjenuorhxxaw.supabase.co
      - key: GOOGLE_REDIRECT_URI
        value: https://dailynotion-backend.onrender.com/api/auth/google/callback