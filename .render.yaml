# Render Blueprints - Auto-deploy environment variables
services:
  - type: web
    name: dailynotion-backend
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        value: https://dailynotion-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SUPABASE_URL
        value: https://rdwkzqzqhjenuorhxxaw.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: 4277758877-ogrvamvqghtuqnno2r6kvdb0hqf11huj.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://dailynotion-backend.onrender.com/api/auth/google/callback
      - key: NOTION_CLIENT_ID
        value: placeholder_notion_client_id
      - key: NOTION_CLIENT_SECRET
        sync: false
      - key: NOTION_REDIRECT_URI
        value: https://dailynotion-backend.onrender.com/api/notion/callback
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@dailynotion.app
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_MONTHLY_PRICE_ID
        value: price_placeholder
      - key: STRIPE_PRO_YEARLY_PRICE_ID
        value: price_placeholder
      - key: STRIPE_TEAM_MONTHLY_PRICE_ID
        value: price_placeholder
      - key: STRIPE_TEAM_YEARLY_PRICE_ID
        value: price_placeholder